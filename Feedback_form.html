<!DOCTYPE html>
<html>
<head>
    <title>Feedback Form</title>
</head>
<body>
    <h2>Feedback Form</h2>

    <form>
    <label>Name:</label><br>
    <input type="text" name="name" placeholder="Enter your name" required><br><br>

    <label>Email ID:</label><br>
    <input type="email" name="email" placeholder="Enter your email" required><br><br>

    <label>Mobile No:</label><br>
    <input type="tel" name="mobile" placeholder="Enter your mobile number" required><br><br>
    
    <label>Are you satisfied with our service:</label><br>
    <input type="radio" name=":" value="Yes" required>Yes <br>
    <input type="radio" name=":" value="No"> No<br><br>

    <label>Any suggestion:</label><br>
    <textarea name="message" rows="4" cols="50" placeholder="Enter your suggestion" required></textarea><br><br>

    <button type="submit">Submit</button>
</form>

    
</body>
</html>
