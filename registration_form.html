<!DOCTYPE html>
<html>
<head>
    <title>REGISTRATION FORM</title>
</head>
<body>
    <h2>REGISTRATION FORM</h2>

    <form>
        
        <label>Name:</label><br>
        <input type="text" name="name" required><br><br>

        <label>Registration.no:</label><br>
        <input type="resitration.no" name="resitration.no"pattern="[0-9]{10}" required><br><br>

        <label>Roll no:</label><br>
        <input type="Roll no" name="Roll no" pattern="[0-9]{10}" required><br><br>

        <label>Father name:</label><br>
        <input type="father name" name="Father name" required><br><br>

        <label>Gender:</label><br>
        <input type="radio" name="gender" value="Male" required> Male<br>
        <input type="radio" name="gender" value="Female"> Female<br>
        <input type="radio" name="gender" value="Other"> Other<br><br>


        <label>Department:</label><br>
        <input type="Department" name="Department" required><br><br>

        <label>DOB:</label><br>
        <input type="Date of birth" name="Date of birth"pattern="[0-9]{10}" required><br><br>

        <label>Address:</label><br>
        <textarea name="Address" row="5" cols="40" required></textarea><br><br>

        <label>Mob.no:</label><br>
        <input type="tel" name="mobile.no" required><br><br>

        <input type="submit" value="Register" >
        <input type="reset" value="Clear" >

    
    </form>
    
</body>
</html>
